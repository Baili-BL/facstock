<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8f9fa">
    <title>FacSstock</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <script>
        // 移动端适配 - 设置 rem 基准值
        (function() {
            const docEl = document.documentElement;
            const resizeEvent = 'orientationchange' in window ? 'orientationchange' : 'resize';
            let lastWidth = 0;
            
            function setRem() {
                const width = docEl.clientWidth || window.innerWidth;
                // 限制最大宽度为 750px (设计稿宽度)
                const maxWidth = 750;
                const actualWidth = Math.min(width, maxWidth);
                // 设计稿基于 375px宽度，font-size = 16px
                const fontSize = actualWidth / (maxWidth / 16);
                docEl.style.fontSize = fontSize + 'px';
                docEl.dataset.width = actualWidth;
                lastWidth = actualWidth;
            }
            
            // 初始化
            setRem();
            
            // 监听屏幕变化
            window.addEventListener(resizeEvent, setRem, { passive: true });
            window.addEventListener('pageshow', function(e) {
                if (e.persisted) setRem();
            }, { passive: true });
            
            // 防止双击缩放
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
        })();
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
