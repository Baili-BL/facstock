# ============================================================
# 布林带收缩策略扫描器 - Docker Compose 部署（使用宿主机 MySQL）
#
# 前提：服务器已安装 MySQL 8，数据库 stock_scanner 已创建，密码 StockPass@2024
#
# 使用方法：
#   docker compose up -d --build
#
# 停止服务：
#   docker compose down
#
# 查看日志：
#   docker compose logs -f app
# ============================================================
version: '3.8'

services:
  # Flask 应用（包含前端构建）
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: stock_scanner
    restart: always
    ports:
      - "5002:5002"
    environment:
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=StockPass@2024
      - MYSQL_DATABASE=stock_scanner
      - TZ=Asia/Shanghai
      # 数据代理（如果服务器IP被金融网站封禁，配置HTTP代理绕过）
      # 格式: http://ip:port 或 http://user:pass@ip:port
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge
