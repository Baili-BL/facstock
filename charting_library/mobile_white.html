<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>股票图表</title>
	<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="theme-color" content="#ffffff">
	<style>
		html, body { margin: 0; height: 100%; height: 100dvh; overflow: hidden; background: #fff; font-family: system-ui, -apple-system, sans-serif; }
		.tv-h5 { display: flex; flex-direction: column; height: 100%; height: 100dvh; box-sizing: border-box; padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0); }
		.tv-h5-bar {
			flex-shrink: 0; display: flex; align-items: center; gap: 8px;
			height: 48px; padding: 0 8px 0 4px;
			border-bottom: 1px solid rgba(0,0,0,0.08); background: #fff;
			position: relative; z-index: 200;
		}
		.tv-h5-back {
			border: none; background: transparent; padding: 10px; cursor: pointer;
			color: #1c1c1e; border-radius: 10px; -webkit-tap-highlight-color: transparent;
		}
		.tv-h5-back:active { background: rgba(0,0,0,0.05); }
		.tv-h5-title {
			flex: 1; font-size: 16px; font-weight: 700; color: #1c1c1e;
			overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		}
		#tv_chart_container { flex: 1; min-height: 0; width: 100%; position: relative; }
		.tv-h5-attr {
			flex-shrink: 0; display: flex; align-items: center; justify-content: center;
			padding: 4px 0; border-top: 1px solid rgba(0,0,0,0.05); background: #fff;
		}
		.tv-h5-attr span { font-size: 10px; color: rgba(0,0,0,0.28); }

	</style>

	<script type="text/javascript" src="charting_library/charting_library.standalone.js"></script>
	<script type="text/javascript" src="datafeeds/udf/dist/bundle.js"></script>

	<script type="text/javascript">
		// ── 全局状态 ───────────────────────────────────────────────────────
		var tvWidget = null;

		// ── URL 解析 ──────────────────────────────────────────────────────
		function getParameterByName(name) {
			name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
			var regex = new RegExp('[\\?&]' + name + '=([^&#]*)'),
				results = regex.exec(location.search);
			return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
		}

		// ── 返回 ─────────────────────────────────────────────────────────
		function goBack() {
			if (window.history.length > 1) {
				window.history.back();
			} else if (document.referrer && document.referrer.indexOf(location.host) >= 0) {
				location.href = document.referrer;
			} else {
				location.href = '/frontend/';
			}
		}

		// ── 初始化 ────────────────────────────────────────────────────────
		function initOnReady() {
			var symbol    = getParameterByName('symbol') || 'SSE:600519';
			var locale    = getParameterByName('locale') || 'zh';
			var dispName  = getParameterByName('name');
			var shortCode = symbol.includes(':') ? symbol.split(':')[1] : symbol;

			var titleEl = document.getElementById('tv-h5-title');
			if (titleEl) {
				titleEl.textContent = dispName
					? (dispName + ' · ' + shortCode)
					: symbol;
			}
			document.title = dispName ? (dispName + ' · 图表') : '股票图表';

			// ── Datafeed ──────────────────────────────────────────────────
			var datafeedUrl = window.__tvDatafeedUrl__ || (location.origin + '/tv_udf');
			var udfDatafeed = new Datafeeds.UDFCompatibleDatafeed(datafeedUrl, 10 * 1000, {
				maxResponseLength: 60,
				expectedOrder: 'latestFirst',
			});

			// ── Widget ───────────────────────────────────────────────────
			tvWidget = new TradingView.widget({
				fullscreen: false,
				autosize: true,
				symbol: symbol,
				interval: '1D',
				container: 'tv_chart_container',
				datafeed: udfDatafeed,
				library_path: 'charting_library/',
				locale: locale,

			// 启用原生顶部工具栏（K线类型、时间周期、指标等）
				disabled_features: [
					'use_localstorage_for_settings',
					'timeframes_toolbar',
					'edit_buttons_in_legend',
					'context_menus',
					'control_bar',
					'border_around_the_chart',
					'save_chart_properties_to_local_storage',
					'chart_crosshair_menu',
					'display_market_status',
				],

				enabled_features: [
					'study_templates',
				],

				// 图表样式
				overrides: {
					'paneProperties.background':                         '#ffffff',
					'paneProperties.backgroundType':                    'solid',
					'paneProperties.vertGridProperties.color':          'rgba(0,0,0,0.06)',
					'paneProperties.horzGridProperties.color':          'rgba(0,0,0,0.06)',
					'scalesProperties.textColor':                        'rgba(0,0,0,0.45)',
					'scalesProperties.lineColor':                        'rgba(0,0,0,0.08)',
					'mainSeriesProperties.candleStyle.upColor':          '#ef5350',
					'mainSeriesProperties.candleStyle.downColor':        '#26a69a',
					'mainSeriesProperties.candleStyle.borderUpColor':   '#ef5350',
					'mainSeriesProperties.candleStyle.borderDownColor':  '#26a69a',
					'mainSeriesProperties.candleStyle.wickUpColor':    '#ef5350',
					'mainSeriesProperties.candleStyle.wickDownColor':   '#26a69a',
				},

				charts_storage_api_version: '1.1',
				client_id: 'facSstock_mobile_v1',
				user_id: 'public_user',
				debug: false,
			});

			tvWidget.onChartReady(function() {
				console.log('[TV Chart] ready:', symbol);
			});
		}

		window.addEventListener('DOMContentLoaded', initOnReady, false);
	</script>
</head>
<body>
	<div class="tv-h5">
		<header class="tv-h5-bar">
			<button type="button" class="tv-h5-back" onclick="goBack()" aria-label="返回">
				<svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
					<path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
				</svg>
			</button>
			<h1 class="tv-h5-title" id="tv-h5-title">图表</h1>
		</header>
		<div id="tv_chart_container"></div>
		<div class="tv-h5-attr">
			<span>Powered by TradingView</span>
		</div>
	</div>
</body>
</html>
